<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sms Tamu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-section" class="container">
        <h1 class="brand-title">Sms Tamu 💖</h1>
        <div class="auth-card">
            <h2 id="auth-title">Login to Account</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button id="auth-btn" onclick="handleAuth()">Login</button>
            <p class="toggle-auth" onclick="toggleAuthMode()">Don't have an account? Sign up here.</p>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header>
            <h1 class="brand-title">Sms Tamu 💖</h1>
        </header>

        <main id="content-area">
            
            <div id="view-home" class="view-section">
                <div id="posts-container">
                    <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">Loading posts...</p>
                </div>
            </div>

            <div id="view-add" class="view-section hidden">
                <div class="add-post-card">
                    <h2>Write Message</h2>
                    <select id="post-category" class="custom-input">
                        <option value="" disabled selected>Select Category...</option>
                        <option value="Kuomba Msamaha">Kuomba Msamaha</option>
                        <option value="Kusifia">Kusifia</option>
                        <option value="Kuvutia">Kuvutia</option>
                        <option value="Mengineyo">Mengineyo</option>
                    </select>
                    <textarea id="post-content" class="custom-input" rows="5" placeholder="Write your sweet message here..."></textarea>
                    <button id="submit-post-btn" onclick="submitPost()">Post Message</button>
                </div>
            </div>

            <div id="view-profile" class="view-section hidden">
                <div class="profile-header">
                    <div class="profile-avatar-container">
                        <img id="profile-img" src="https://via.placeholder.com/150" alt="Profile" class="profile-img">
                        <button class="edit-avatar-btn" onclick="document.getElementById('avatar-upload').click()">
                            <i class="fas fa-camera"></i>
                        </button>
                        <input type="file" id="avatar-upload" hidden accept="image/*" onchange="uploadAvatar(event)">
                    </div>
                    <h2 id="profile-name">User</h2>
                    <p id="profile-bio">God be with us....</p>
                    <div class="profile-stats">
                        <div><strong>1</strong><br>Following</div>
                        <div><strong>0</strong><br>Followers</div>
                    </div>
                    <button class="edit-profile-btn" onclick="openEditProfile()">Edit Profile</button>
                </div>
                
                <div class="profile-tabs">
                    <div class="tab active">My Posts</div>
                    <div class="tab">Liked</div>
                    <div class="tab">Saved</div>
                </div>
                <div id="user-posts-container" class="temp-text">
                    Loading your posts...
                </div>
                
                <button onclick="logout()" class="logout-btn" style="width: 100%; margin-top: 20px;">Logout</button>
            </div>

            <div id="edit-profile-modal" class="modal hidden">
                <div class="modal-content">
                    <h3>Edit Profile</h3>
                    <input type="text" id="edit-username" class="custom-input" placeholder="Username">
                    <textarea id="edit-bio" class="custom-input" rows="3" placeholder="Write a short bio..."></textarea>
                    <div class="modal-actions">
                        <button onclick="closeEditProfile()" class="cancel-btn">Cancel</button>
                        <button onclick="saveProfile()" class="save-btn">Save</button>
                    </div>
                </div>
            </div>

            <div id="view-search" class="view-section hidden"><h3 class="temp-text">Search coming soon...</h3></div>
            <div id="view-chat" class="view-section hidden"><h3 class="temp-text">Chat coming soon...</h3></div>

        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="navigate('home', this)">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" onclick="navigate('search', this)">
                <i class="fas fa-search"></i>
                <span>Search</span>
            </div>
            <div class="nav-item add-post" onclick="navigate('add', this)">
                <i class="fas fa-plus"></i>
            </div>
            <div class="nav-item" onclick="navigate('chat', this)">
                <i class="fas fa-comment-dots"></i>
                <span>Chat</span>
            </div>
            <div class="nav-item" onclick="navigate('profile', this)">
                <i class="fas fa-user"></i>
                <span>Profile</span>
            </div>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
